<div style="padding-inline: 100px; padding-top: 30px; background: white;">
<app-card [hidHeader]="true" [options]="false">
    <div style="text-align: center;">
        <h1>Consulta Proceso</h1>
    </div>

    <hr>
    <div class="row">
        <div class="col">
            <div class="mb-3"><label>Nombre: <strong>Pablo Matamoros</strong></label></div>
            <div class="mb-3"><label>C.C: <strong>1064789321</strong></label></div>
        </div>
        <div class="col">
            <div class="mb-3"><label>Expediente: <strong> EXP2024-001</strong></label></div>
            <div class="mb-3"><label>Fecha Inicio: <strong>1064789321</strong></label></div>
        </div>
    </div>
    <hr>
    <form>

        <div class="mb-3 row">
            <div class="col-sm-8">
                <div class="row">
                    <label for="table-filtering-search" class="col-xs-3 col-sm-auto col-form-label">Buscar:</label>
                    <div class="col-xs-3 col-sm-auto">
                        <input id="table-filtering-search" class="form-control" type="text" [formControl]="filter" />
                    </div>
                </div>
            </div>
        </div>
    </form>

    <div class="">
        <div class="row">
            <div class="table-outer">
                <table class="table table-bordered" style="text-align: center; cursor: default;">
                    <thead>
                        <tr class="table-primary">
                            <th scope="col">Documento</th>
                            <th scope="col">Observación</th>
                            <th scope="col">Fecha de Subida</th>
                        </tr>
                    </thead>
                    <tbody class="table align-middle">
                        @for (country of countries$ | async; track country.name) {
                        <tr>
                            <td (click)="verDocumento('assets/docs/plantilla/ejm.pdf')" class="urlDoc">{{ country.name }}</td>
                            <td>
                                {{ country.category }}
                            </td>
                            <td>
                                {{country.area.toLocaleDateString('es-ES', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit',
                                })}}
                            </td>
                            <!-- <td>{{ country.area.getFullYear() +"/"+country.area.getMonth()+"/"+country.area.getDate() }}</td> -->

                        </tr>
                        }
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between p-2">
                <ngb-pagination [collectionSize]="collectionSize" [(page)]="page" [pageSize]="pageSize"
                    (pageChange)="refreshCountries()">
                </ngb-pagination>

                <select class="form-select" style="width: auto" [(ngModel)]="pageSize"
                    (ngModelChange)="refreshCountries()">
                    <option [ngValue]="10">10 items</option>
                    <option [ngValue]="20">20 items</option>
                    <option [ngValue]="50">50 items</option>
                </select>
            </div>


        </div>
    </div>
</app-card>
</div>
