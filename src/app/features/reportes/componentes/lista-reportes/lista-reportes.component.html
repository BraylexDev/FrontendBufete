<p style="text-align: center">
  Esta pantalla permite visualizar y crear procesos o expedientes
</p>
<hr />
<div class="row">
  <div class="col-lg-12">
    <!-- Barra superior: búsqueda + botón -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <!-- Campo de búsqueda -->
      <div class="input-group w-50">
        <span class="input-group-text" id="icon-search">
          <i class="bi bi-search"></i>
        </span>
        <input
          type="search"
          class="form-control"
          placeholder="Buscar..."
          aria-label="Buscar"
          aria-describedby="icon-search"
          [(ngModel)]="filtroBusqueda"
        />
      </div>

      <!-- Botón para subir documento diligenciado -->
      <button class="btn btn-outline-primary" (click)="openModal()">
        <i
          class="feather icon-plus-circle"
          style="font-size: 20px; padding-right: 8px"
        ></i>
         Crear Proceso / Expediente
      </button>
    </div>

    <!-- Árbol de procesos / expedientes / documentos -->
    <!-- Empty State -->
    <app-card
      [hidHeader]="true"
      [options]="false"
      *ngIf="listaprocesos.length === 0"
    >
      <div class="empty-state">
        <h3>No Hay Procesos Registrados</h3>
        <p>Comienza creando un proceso</p>
      </div>
    </app-card>

    <app-card
      [hidHeader]="true"
      [options]="false"
      *ngIf="listaprocesos.length > 0"
    >
      <ul class="list-unstyled">
        <li
          *ngFor="let proceso of procesosFiltrados"
          style="padding-bottom: 20px"
        >
          <!-- Fila de Proceso -->
          <div
            class="d-flex align-items-center"
            (click)="toggleProceso(proceso)"
            style="cursor: pointer"
          >
            <button class="btn btn-sm btn-link text-decoration-none">
              <i
                class="bi"
                [ngClass]="
                  proceso.abierto ? 'bi-caret-down-fill' : 'bi-caret-right-fill'
                "
                style="color: gray"
              ></i>
            </button>
            <i class="feather icon-folder" style="font-size:30px; margin-inline: 10px;  color: #033857"></i>
            <strong class="ms-1">{{ proceso.nombre }}</strong>
          </div>

          <!-- Expedientes (colapsable) -->
          <ul class="list-unstyled ms-4" *ngIf="proceso.abierto">
            <li *ngFor="let exp of proceso.expedientes">
              <!-- Fila de Expediente -->
              <div class="d-flex align-items-center" style="cursor: pointer; margin-block: 10px;">
                <button class="btn btn-sm btn-link text-decoration-none">
                  <i
                    class="bi"
                    [ngClass]="
                      !exp.abierto
                        ? 'bi-caret-down-fill'
                        : 'bi-caret-right-fill'
                    "
                    style="color: gray"
                  ></i>
                </button>
                <i class="feather icon-file-text" style="font-size:30px; margin-inline: 10px; color: #033857"></i>
                <span class="ms-1" (click)="toFolder(exp)">{{
                  exp.numero
                }}</span>
              </div>
            </li>
          </ul>
        </li>
      </ul>
    </app-card>
  </div>
</div>
