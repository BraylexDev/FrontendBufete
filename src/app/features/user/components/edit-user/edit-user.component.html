<div class="row">
    <div class="col-md-12">
        <app-alert></app-alert>
    </div>
    <div class="col-sm-12">
        <app-card [hidHeader]="true" [options]="false">
            <h5>Información</h5>
            <hr />
            <div class="row">
                <div class="col-md-6">
                    <form [formGroup]="form" action="javascript:">
                        <div class="form-group">
                            <label>*Nombre</label>
                            <input type="text" formControlName="nombre" class="form-control" placeholder="Nombre" />
                            <div *ngIf="form.get('nombre')!.hasError('required') && form.get('nombre')!.touched"
                                style="color:red">
                                El nombre es requerido.
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="exampleInputEmail1">*Correo</label>
                            <input type="email" formControlName="email" class="form-control" id="exampleInputEmail1"
                                aria-describedby="emailHelp" placeholder="Correo" />
                            <div *ngIf="form.get('email')!.hasError('required') && form.get('email')!.touched"
                                style="color:red">
                                El email es requerido.
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="exampleInputPassword1">*Contrasena</label>
                            <input type="text" formControlName="contrasena" class="form-control key"  autocomplete="off"
                                id="exampleInputPassword1" placeholder="Contrasena" />
                            <div *ngIf="form.get('contrasena')!.hasError('required') && form.get('contrasena')!.touched"
                                style="color:red">
                                Contrasena requerida.
                            </div>
                        </div>
                    </form>
                </div>
                <div class="col-md-6">
                    <form [formGroup]="form" action="javascript:">
                        <div class="form-group">
                            <label>*Apellido</label>
                            <input type="text" formControlName="apellido" class="form-control" placeholder="Apellido" />
                            <div *ngIf="form.get('apellido')!.hasError('required') && form.get('apellido')!.touched"
                                style="color:red">
                                El apellido es requerido.
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="exampleFormControlSelect1">*Tipo Usuario</label>
                            <select formControlName="rol_id" class="form-control" id="exampleFormControlSelect1" >
                                <option value='' selected disabled hidden>Seleccione el tipo de usuario</option>
                                <option *ngFor="let p of roles" [value]="p.id">{{p.nombre}}</option>
                            </select>
                            <div *ngIf="form.get('rol_id')!.hasError('required') && form.get('rol_id')!.touched"
                                style="color:red">
                                Tipo de usuario requerido. 
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div style="display: flex; flex-wrap: wrap;">
                <button style="margin-right: 50px;" type="button" class="btn btn-secondary" [routerLink]="['/admin/listaUsuarios']">Cancelar</button>
                <button type="button" class="btn btn-primary" [routerLink]="['/admin/listaUsuarios']" (click)="actualizarUser()" [disabled]="form.invalid">Confirmar</button>
            </div>
        </app-card>
    </div>
</div>
